services:
  - type: web
    name: dataguru
    env: python
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    healthCheckPath: /
    disk:
      name: dataguru-chroma
      mountPath: /opt/render/project/src/chroma_db
      sizeGB: 10
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
      - key: STREAMLIT_BROWSER_GATHER_USAGE_STATS
        value: "false"
      # Optional defaults only. Do NOT put per-user credentials here.
      - key: GROQ_API_KEY
        sync: false
      - key: GITHUB_REPO
        sync: false
      - key: GITHUB_TOKEN
        sync: false
